<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>drme — Page Not Found</title>
    <script>
      // GitHub Pages SPA redirect
      // Preserve the original path + query string + hash for React Router
      var pathSegmentsToKeep = 0; // Set to 1 for /repo-name/ prefix
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/') + 
        l.search + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
